<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ class 8 science · 120 question mega quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="quiz-wrapper" id="quizWrapper">
    <div class="header">
        <div class="score-live">
            ⭐ SCORE <span id="liveScore">0</span>
        </div>
        <div class="theme-toggle" id="themeToggle">
            <button class="active" data-theme="light">☀️ light</button>
            <button data-theme="dark">🌙 dark</button>
        </div>
    </div>

    <div class="question-container">
        <div class="q-meta">
            <span id="qCounter">question 1 / 120</span>
            <span id="qStatus">not answered yet</span>
        </div>
        <div class="q-text" id="questionText">Loading questions...</div>
        <div class="options-grid" id="optionsContainer"></div>
        <div class="hint-box" id="hintContainer"><strong>🔍 hint:</strong> <span id="hintText"></span></div>
        <div id="explanationContainer" class="explanation-box" style="display: none;"></div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn" disabled>◀ previous</button>
        <button class="nav-btn" id="nextBtn">next ▶</button>
        <button class="nav-btn restart-btn" id="restartBtn">↻ reshuffle</button>
    </div>
    <footer>class 8 science · 120 questions · based on NCERT chapters</footer>
</div>

<script src="script.js"></script>
</body>
</html>
